name: Auto Version Bump

# Opens a PR that bumps package.json/VERSION based on Conventional Commits
# (scripts/auto-version.sh). Branch protection on `main` disallows direct
# pushes, so we never push to main from this workflow. The follow-up release
# tag is created by `tag-on-release-merge.yml` once the PR is merged.
#
# Loop guards (any one is sufficient):
#   1. head_commit.author is github-actions[bot]
#   2. head_commit.message contains "chore(release): v" (the merge commit of
#      a previous auto-release PR carries the PR title in its body)
#   3. bump=none from auto-version.sh (no releasable commits)
#   4. branch `chore/auto-release-v<next>` already exists on origin

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-version-bump-main
  cancel-in-progress: false

jobs:
  bump:
    name: Open release PR
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore(release): v') &&
      github.event.head_commit.author.username != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: bump
        run: |
          ./scripts/auto-version.sh --json > /tmp/bump.json
          cat /tmp/bump.json
          NEXT=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/bump.json','utf8')).newVersion")
          BUMP=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/bump.json','utf8')).bumpType")
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Check branch idempotency
        id: branch
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEXT="${{ steps.bump.outputs.next }}"
          BRANCH="chore/auto-release-v${NEXT}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists on origin — skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Apply bump and push branch
        if: steps.bump.outputs.bump != 'none' && steps.branch.outputs.exists == 'false'
        run: |
          NEXT="${{ steps.bump.outputs.next }}"
          BRANCH="${{ steps.branch.outputs.name }}"
          git checkout -b "$BRANCH"
          ./scripts/auto-version.sh --apply
          git add VERSION package.json apps/web/package.json 2>/dev/null || git add VERSION package.json
          git commit -m "chore(release): v${NEXT}" -m "Automated version bump from Conventional Commits since last tag."
          git push origin "$BRANCH"

      - name: Open auto-merge PR
        if: steps.bump.outputs.bump != 'none' && steps.branch.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.bump.outputs.next }}"
          BRANCH="${{ steps.branch.outputs.name }}"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): v${NEXT}" \
            --body $'Automated version bump.\n\nGenerated by `auto-version-bump.yml` from Conventional Commits since last tag.\n\nThe release tag `v'"${NEXT}"$'` will be created by `tag-on-release-merge.yml` once this PR is merged.')
          echo "Opened $PR_URL"
          gh pr merge "$PR_URL" --merge --auto || echo "auto-merge not enabled (branch protection may require manual merge)"
