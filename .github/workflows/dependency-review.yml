name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # Allowlist of licenses compatible with Apache-2.0 (MirrorBuddy license)
          # Using allow-licenses instead of deprecated deny-licenses (removed in v5)
          # AGPL-3.0 allowed for CI-only tools (TruffleHog) - not distributed with app
          allow-licenses: >-
            MIT, MIT-0, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD,
            Unlicense, CC0-1.0, CC-BY-3.0, CC-BY-4.0, MPL-2.0,
            Python-2.0, BlueOak-1.0.0, Zlib, AGPL-3.0
          # protobufjs ships a permissive BSD-3-Clause + Google protobuf
          # additional license file. Scancode reports it as a compound
          # SPDX expression that isn't in our allow-list, but the actual
          # license is BSD-3-Clause + Google's protobuf license — both
          # compatible with Apache-2.0.
          # sharp prebuilt binaries bundle libvips, reported as a compound
          # SPDX expression (Apache-2.0 AND BSD-2-Clause AND LGPL variants
          # AND MIT AND MPL-2.0). sharp itself is Apache-2.0; libvips is
          # LGPL-2.1+ and is dynamically linked, which is compatible with
          # Apache-2.0 distribution.
          allow-dependencies-licenses: 'pkg:npm/protobufjs, pkg:npm/sharp, pkg:npm/@img/sharp-win32-x64, pkg:npm/@img/sharp-darwin-x64, pkg:npm/@img/sharp-darwin-arm64, pkg:npm/@img/sharp-linux-x64, pkg:npm/@img/sharp-linux-arm64, pkg:npm/@img/sharp-linuxmusl-x64, pkg:npm/@img/sharp-linuxmusl-arm64, pkg:npm/@img/sharp-win32-ia32, pkg:npm/@img/sharp-linux-arm, pkg:npm/@img/sharp-libvips-darwin-x64, pkg:npm/@img/sharp-libvips-darwin-arm64, pkg:npm/@img/sharp-libvips-linux-x64, pkg:npm/@img/sharp-libvips-linux-arm64, pkg:npm/@img/sharp-libvips-linux-arm, pkg:npm/@img/sharp-libvips-linuxmusl-x64, pkg:npm/@img/sharp-libvips-linuxmusl-arm64'
